<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Digital Companion</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        input, textarea, button {
            font-family: inherit;
            color: inherit;
        }

        body {
            margin: 0;
            background: #f5f7fb;
            display: block;
            padding: 0;

            font-family:
            -apple-system,
            BlinkMacSystemFont,
            "Segoe UI",
            Roboto,
            Helvetica,
            Arial,
            sans-serif;
        }

        .app {
            width: 100%;
            height: 100dvh;
            background: white;
            border-radius: 0;
            box-shadow: none;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            border-right: 1px solid #e5e7eb;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #e5e7eb;
        }

        #newChatButton {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #1f2937;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        #newChatButton:hover {
            background: #111827;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-item {
            padding: 12px;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid transparent;
            line-height: 1.4;
        }

        .chat-item:hover {
            background: #f1f5f9;
        }

        .chat-item.active {
            border-color: #cbd5e1;
            background: #e2e8f0;
        }

        .chat-item-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-item-time {
            font-size: 12px;
            color: #6b7280;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
        }

        .header {
            position: relative;
            z-index: 2000;
            padding: 18px 20px;
            border-bottom: 1px solid #e5e7eb;
            font-size: 22px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            overflow: hidden;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fafbfc;
            min-height: 0;
        }

        .message {
            max-width: 95%;
            padding: 10px 12px;
            border-radius: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message.user {
            align-self: flex-end;
            margin-left: auto;
            background: #e5e7eb;
        }

        .message.assistant {
            align-self: flex-start;
            margin-right: auto;
            background: #f1f5f9;
        }

        .input-bar {
            margin: 12px;
            display: flex;
            align-items: center;
            gap: 10px;

            padding: 10px 14px;
            padding-bottom: 10px;
            border-radius: 20px;

            border: 1px solid rgba(0,0,0,0.05);
            background: white;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }

        .input-bar:focus-within {
            border-color: #cbd5e1;
            background: white;
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
        }

        /* + 按钮 */
        #addButton {
            border: none;
            background: transparent;
            font-size: 20px;
            cursor: pointer;
            color: #374151;
        }

        /* 输入框 */
        #messageInput {
            flex-grow: 1;
            height: auto;
            border: none;
            outline: none;
            background: transparent;

            resize: none;
            max-height: 120px;
            overflow-y: auto;

            font-size: 16px;
            line-height: 1.5;
        }

        #messageInput:focus {
            border-color: #94a3b8;
        }

        /* 发送按钮（圆的） */
        #sendButton {
            width: 36px;
            height: 36px;

            border: none;
            border-radius: 50%;

            background: #1f2937;
            color: white;

            cursor: pointer;
        }

        #sendButton:disabled,
        #newChatButton:disabled {
            background: #93c5fd;
            cursor: not-allowed;
        }

        #menuButton {
            position: relative;
            z-index: 2001;
            margin-right: 10px;
            font-size: 20px;
            background: none;
            border: none;
            cursor: pointer;
            color: #374151;
        }

        /* 手机模式 */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                height: 100%;
                z-index: 3000;
                transition: 0.3s;
                width: 280px;
            }

            .sidebar.open {
                left: 0;
            }

            .overlay {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.2);
                z-index: 2500;
            }
        }

        .overlay {
            display: none;
            opacity: 0;
            transition: 0.2s;
        }

        .overlay.show {
            display: block;
            opacity: 1;
        }

        .preview-wrap {
            display: none;
            padding: 0 2px;
        }

        .preview-card {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            background: #f8fafc;
        }

        .preview-card img {
            width: 88px;
            height: 88px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
        }

        .preview-meta {
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
        }

        .preview-meta .name {
            font-size: 14px;
            color: #0f172a;
            word-break: break-word;
        }

        .preview-meta button {
            width: fit-content;
            border: none;
            border-radius: 8px;
            padding: 8px 10px;
            cursor: pointer;
            background: #e2e8f0;
        }

        .preview-meta button:hover {
            background: #cbd5e1;
        }

        .message code {
            background: #e5e7eb;
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .message pre {
            background: #f1f5f9;
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="sidebar-header">
            <button id="newChatButton">+ new chat</button>
        </div>
        <div class="chat-list" id="chatList"></div>
    </div>

    <div class="main">
        <div class="header">
            <button id="menuButton">☰</button>
            <span id="chatTitle">💬 Digital Companion</span>
        </div>
        <div class="chat-box" id="chatBox"></div>

        <div class="input-bar">
            <button id="addButton">+</button>

            <textarea
                id="messageInput"
                placeholder="What's on your mind?"
                rows="1"
            ></textarea>

            <button id="sendButton">➤</button>

            <input id="imageInput" type="file" accept="image/*" hidden />
        </div>
    </div>
</div>
<div class="overlay"></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
    const SESSION_ID = "digital-companion-main";
    const API_BASE = "https://personal1-e9lq.onrender.com";

    const chatBox = document.getElementById("chatBox");
    const messageInput = document.getElementById("messageInput");
    const sendButton = document.getElementById("sendButton");
    const newChatButton = document.getElementById("newChatButton");
    const chatList = document.getElementById("chatList");
    const chatTitle = document.getElementById("chatTitle");

    const imageInput = document.getElementById("imageInput");

    const menuButton = document.getElementById("menuButton");
    const sidebar = document.querySelector(".sidebar");

    const overlay = document.querySelector(".overlay");

    let currentChatId = null;
    let messages = [];
    let chatListData = [];
    let uploadedImagePath = null;

    window.addEventListener("load", () => {
        messageInput.style.height = "auto";
        messageInput.style.height = messageInput.scrollHeight + "px";
    });

    function scrollToBottom() {
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function createMessageElement(role, text, image) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${role}`;

        // 如果有图片，先加图片
        if (image) {
            const img = document.createElement("img");
            img.src = API_BASE + image;  // 或直接用你的路径
            img.style.maxWidth = "160px";
            img.style.borderRadius = "10px";
            img.style.display = "block";
            img.style.marginBottom = text ? "6px" : "0";

            msgDiv.appendChild(img);
        }

        // 再加文字
        if (text) {
            const textNode = document.createElement("div");
            textNode.innerHTML = marked.parse(text);
            msgDiv.appendChild(textNode);
        }

        return msgDiv;
    }

    function renderMessages() {
        chatBox.innerHTML = "";
        for (const msg of messages) {
            chatBox.appendChild(createMessageElement(msg.role, msg.text, msg.image));
        }
        scrollToBottom();
    }

    function renderChatList() {
        chatList.innerHTML = "";

        for (const item of chatListData) {
            const div = document.createElement("div");
            div.className = "chat-item";
            if (item.chat_id === currentChatId) {
                div.classList.add("active");
            }

            const title = document.createElement("div");
            title.className = "chat-item-title";
            title.textContent = item.title || "新对话";

            const time = document.createElement("div");
            time.className = "chat-item-time";
            time.textContent = item.updated_at
                ? item.updated_at.split("T")[0]
                : "";

            div.appendChild(title);
            div.appendChild(time);

            div.addEventListener("click", () => {
                openChat(item.chat_id);
            });

            chatList.appendChild(div);
        }
    }

    function setLoading(isLoading) {
        sendButton.disabled = isLoading;
        newChatButton.disabled = isLoading;
        messageInput.disabled = isLoading;
        imageInput.disabled = isLoading;
    }

    function clearImage() {
        uploadedImagePath = null;
        imageInput.value = "";
    }

    async function loadChatList() {
        const response = await fetch(
            `${API_BASE}/chats?session_id=${encodeURIComponent(SESSION_ID)}`,
            {
                headers: {
                    "ngrok-skip-browser-warning": "1"
                }
            }
        );
        if (!response.ok) {
            throw new Error(`加载聊天列表失败: HTTP ${response.status}`);
        }

        const data = await response.json();
        chatListData = data.chats || [];
        renderChatList();
        return chatListData;
    }

    async function openChat(chatId) {
        const response = await fetch(
            `${API_BASE}/history?session_id=${encodeURIComponent(SESSION_ID)}&chat_id=${encodeURIComponent(chatId)}`,
            {
                headers: {
                    "ngrok-skip-browser-warning": "1"
                }
            }
        );

        if (!response.ok) {
            throw new Error(`加载聊天记录失败: HTTP ${response.status}`);
        }

        const data = await response.json();

        currentChatId = chatId;
        messages = data.map(m => ({
            role: m.role,
            text: m.content
        }));
        chatTitle.textContent = data.title || "💬 Digital Companion";

        renderMessages();
        renderChatList();
    }

    async function createNewChat() {
        const response = await fetch(`${API_BASE}/new-chat`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "ngrok-skip-browser-warning": "1"
            },
            body: JSON.stringify({
                session_id: SESSION_ID
            })
        });

        if (!response.ok) {
            throw new Error(`新建聊天失败: HTTP ${response.status}`);
        }

        const data = await response.json();
        await loadChatList();
        await openChat(data.chat_id);
    }

    async function sendMessage() {
        const message = messageInput.value.trim();
        const imageToSend = uploadedImagePath;

        if (!message) return;

        if (!currentChatId) {
            await createNewChat();
        }

        // 先显示用户消息
        messages.push({
            role: "user",
            text: message,
            image: imageToSend
        });
        renderMessages();

        clearImage();
        messageInput.focus();

        messageInput.value = "";
        setLoading(true);

        // 预留 assistant 气泡
        const assistantMsgDiv = createMessageElement("assistant", "...");
        chatBox.appendChild(assistantMsgDiv);
        scrollToBottom();

        try {
            const response = await fetch(`${API_BASE}/chat`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: message,
                    session_id: SESSION_ID,
                    chat_id: currentChatId,
                    image_path: imageToSend
                })
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            // ✅ 非流式：直接拿完整结果
            const data = await response.json();
            const fullReply = data.reply || "";

            // 👉 更新 UI
            assistantMsgDiv.innerHTML = marked.parse(fullReply);

            // 👉 存到本地 messages
            messages.push({
                role: "assistant",
                text: fullReply
            });

            scrollToBottom();

            // 👉 只更新左边列表（不要 reload 当前聊天）
            await loadChatList();

        } catch (error) {
            console.error("请求失败:", error);
            assistantMsgDiv.textContent = `请求失败：${error.message}`;
        } finally {
            setLoading(false);
            messageInput.focus();
            scrollToBottom();
        }

        console.log("发送时 image_path =", uploadedImagePath);
    }

    async function uploadImage(file) {
        const formData = new FormData();
        formData.append("file", file);

        const res = await fetch(`${API_BASE}/upload-image`, {
            method: "POST",
            headers: {
                "ngrok-skip-browser-warning": "1"
            },
            body: formData
        });

        if (!res.ok) {
            throw new Error(`图片上传失败: HTTP ${res.status}`);
        }

        const data = await res.json();
        uploadedImagePath = data.image_path;

        document.getElementById("removeImageButton").addEventListener("click", clearImage);
    }

    addButton.addEventListener("click", () => {
        imageInput.click();
    });

    sendButton.addEventListener("click", () => {
        console.log("clicked");
        sendMessage();
    });

    newChatButton.addEventListener("click", async () => {
        try {
            setLoading(true);
            await createNewChat();
            messageInput.focus();
        } catch (error) {
            console.error("新建聊天失败:", error);
            alert(`新建聊天失败：${error.message}`);
        } finally {
            setLoading(false);
        }
    });

    messageInput.addEventListener("keydown", function (event) {
        if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    });

    messageInput.addEventListener("input", () => {
        messageInput.style.height = "auto";
        messageInput.style.height = messageInput.scrollHeight + "px";
    });

    const inputBar = document.querySelector(".input-bar");

    inputBar.addEventListener("dragover", (e) => {
        e.preventDefault();
        inputBar.style.background = "#eef2f7";
    });

    inputBar.addEventListener("dragleave", () => {
        inputBar.style.background = "#f8fafc";
    });

    inputBar.addEventListener("drop", async (e) => {
        e.preventDefault();
        inputBar.style.background = "#f8fafc";

        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith("image/")) {
            await uploadImage(file);
        }
    });

    imageInput.addEventListener("change", async () => {
        if (imageInput.files[0]) {
            try {
                await uploadImage(imageInput.files[0]);
            } catch (error) {
                console.error(error);
                alert(error.message);
            }
        }
    });

    window.addEventListener("load", async () => {
        try {
            await loadChatList();

            if (chatListData.length > 0) {
                await openChat(chatListData[0].chat_id);
            } else {
                await createNewChat();
            }
        } catch (error) {
            console.error("初始化失败:", error);
            chatTitle.textContent = "💬 Digital Companion";
            chatBox.innerHTML = "";
            chatBox.appendChild(createMessageElement("assistant", `初始化失败：${error.message}`));
        }
    });

    menuButton.addEventListener("click", () => {
        sidebar.classList.toggle("open");
        overlay.classList.toggle("show");
    });

    document.addEventListener("click", (e) => {
        if (!sidebar.contains(e.target) && !menuButton.contains(e.target)) {
            sidebar.classList.remove("open");
        }
    });
    
    overlay.addEventListener("click", () => {
        sidebar.classList.remove("open");
        overlay.classList.remove("show");
    });

</script>

</body>
</html>
