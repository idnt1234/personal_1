<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Companion</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            padding: 24px;
        }

        .app {
            width: 100%;
            max-width: 1100px;
            height: 90vh;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            border-right: 1px solid #e5e7eb;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #e5e7eb;
        }

        #newChatButton {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        #newChatButton:hover {
            background: #1d4ed8;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-item {
            padding: 12px;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid transparent;
            line-height: 1.4;
        }

        .chat-item:hover {
            background: #eff6ff;
        }

        .chat-item.active {
            border-color: #60a5fa;
            background: #dbeafe;
        }

        .chat-item-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .chat-item-time {
            font-size: 12px;
            color: #6b7280;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .header {
            position: relative;
            z-index: 2000;
            padding: 18px 20px;
            border-bottom: 1px solid #e5e7eb;
            font-size: 22px;
            font-weight: bold;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fafbfc;
        }

        .message {
            max-width: 75%;
            padding: 12px 14px;
            border-radius: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: #dbeafe;
        }

        .message.assistant {
            align-self: flex-start;
            background: #ececec;
        }

        .input-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 16px;
            border-top: 1px solid #e5e7eb;
            background: white;
        }

        .upload-zone {
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            text-align: center;
            padding: 6px 10px;
            font-size: 13px;
            color: #475569;
            cursor: pointer;
            user-select: none;
            transition: 0.15s ease;
            height: 36px;
            max-width: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .upload-zone.dragover {
            background: #eff6ff;
            border-color: #60a5fa;
        }

        .upload-zone small {
            display: none;
            margin-top: 6px;
            color: #64748b;
        }

        .upload-zone:hover {
            background: #f1f5f9;
        }

        #messageInput {
            width: 100%;
            padding: 12px 14px;
            font-size: 16px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            outline: none;
        }

        #messageInput:focus {
            border-color: #60a5fa;
        }

        .send-row {
            display: flex;
            gap: 12px;
        }

        #sendButton {
            padding: 12px 18px;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            cursor: pointer;
            min-width: 90px;
        }

        #sendButton:hover {
            background: #1d4ed8;
        }

        #sendButton:disabled,
        #newChatButton:disabled {
            background: #93c5fd;
            cursor: not-allowed;
        }

        #menuButton {
            position: relative;
            z-index: 2001;
            margin-right: 10px;
            font-size: 20px;
            background: none;
            border: none;
            cursor: pointer;
        }

        /* 手机模式 */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                height: 100%;
                z-index: 1000;
                transition: 0.3s;
                width: 280px;
            }

            .sidebar.open {
                left: 0;
            }
        }

        .preview-wrap {
            display: none;
            padding: 0 2px;
        }

        .preview-card {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            background: #f8fafc;
        }

        .preview-card img {
            width: 88px;
            height: 88px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
        }

        .preview-meta {
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
        }

        .preview-meta .name {
            font-size: 14px;
            color: #0f172a;
            word-break: break-word;
        }

        .preview-meta button {
            width: fit-content;
            border: none;
            border-radius: 8px;
            padding: 8px 10px;
            cursor: pointer;
            background: #e2e8f0;
        }

        .preview-meta button:hover {
            background: #cbd5e1;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="sidebar-header">
            <button id="newChatButton">+ 新建聊天</button>
        </div>
        <div class="chat-list" id="chatList"></div>
    </div>

    <div class="main">
        <div class="header">
            <button id="menubutton">☰</button>
            <span id="chatTitle">💬 Digital Companion</span>
        </div>
        <div class="chat-box" id="chatBox"></div>

        <div class="input-area">
            <div id="dropZone" class="upload-zone">
                把图片拖到这里，或点击选择
                <small>支持 jpg / png / webp 等图片</small>
                <input id="imageInput" type="file" accept="image/*" style="display:none;" />
            </div>

            <div id="imagePreview" class="preview-wrap"></div>

            <div class="send-row">
                <input
                    id="messageInput"
                    type="text"
                    placeholder="输入你想说的话..."
                    autocomplete="off"
                />
                <button id="sendButton">发送</button>
            </div>
        </div>
    </div>
</div>

<script>
    const SESSION_ID = "digital-companion-main";
    const API_BASE = "https://personal1-e9lq.onrender.com";

    const chatBox = document.getElementById("chatBox");
    const messageInput = document.getElementById("messageInput");
    const sendButton = document.getElementById("sendButton");
    const newChatButton = document.getElementById("newChatButton");
    const chatList = document.getElementById("chatList");
    const chatTitle = document.getElementById("chatTitle");

    const dropZone = document.getElementById("dropZone");
    const imageInput = document.getElementById("imageInput");
    const imagePreview = document.getElementById("imagePreview");

    const menuButton = document.getElementById("menuButton");
    const sidebar = document.querySelector(".sidebar");

    let currentChatId = null;
    let messages = [];
    let chatListData = [];
    let uploadedImagePath = null;

    function scrollToBottom() {
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function createMessageElement(role, text) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${role}`;
        msgDiv.textContent = text;
        return msgDiv;
    }

    function renderMessages() {
        chatBox.innerHTML = "";
        for (const msg of messages) {
            chatBox.appendChild(createMessageElement(msg.role, msg.text || ""));
        }
        scrollToBottom();
    }

    function renderChatList() {
        chatList.innerHTML = "";

        for (const item of chatListData) {
            const div = document.createElement("div");
            div.className = "chat-item";
            if (item.chat_id === currentChatId) {
                div.classList.add("active");
            }

            const title = document.createElement("div");
            title.className = "chat-item-title";
            title.textContent = item.title || "新对话";

            const time = document.createElement("div");
            time.className = "chat-item-time";
            time.textContent = item.updated_at || "";

            div.appendChild(title);
            div.appendChild(time);

            div.addEventListener("click", () => {
                openChat(item.chat_id);
            });

            chatList.appendChild(div);
        }
    }

    function setLoading(isLoading) {
        sendButton.disabled = isLoading;
        newChatButton.disabled = isLoading;
        messageInput.disabled = isLoading;
        imageInput.disabled = isLoading;
        dropZone.style.pointerEvents = isLoading ? "none" : "auto";
        dropZone.style.opacity = isLoading ? "0.7" : "1";
    }

    function clearImage() {
        uploadedImagePath = null;
        imageInput.value = "";
        imagePreview.style.display = "none";
        imagePreview.innerHTML = "";
    }

    async function loadChatList() {
        const response = await fetch(
            `${API_BASE}/chats?session_id=${encodeURIComponent(SESSION_ID)}`,
            {
                headers: {
                    "ngrok-skip-browser-warning": "1"
                }
            }
        );
        if (!response.ok) {
            throw new Error(`加载聊天列表失败: HTTP ${response.status}`);
        }

        const data = await response.json();
        chatListData = data.chats || [];
        renderChatList();
        return chatListData;
    }

    async function openChat(chatId) {
        const response = await fetch(
            `${API_BASE}/history?session_id=${encodeURIComponent(SESSION_ID)}&chat_id=${encodeURIComponent(chatId)}`,
            {
                headers: {
                    "ngrok-skip-browser-warning": "1"
                }
            }
        );

        if (!response.ok) {
            throw new Error(`加载聊天记录失败: HTTP ${response.status}`);
        }

        const data = await response.json();

        currentChatId = chatId;
        messages = data.messages || [];
        chatTitle.textContent = data.title || "💬 Digital Companion";

        renderMessages();
        renderChatList();
    }

    async function createNewChat() {
        const response = await fetch(`${API_BASE}/new-chat`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "ngrok-skip-browser-warning": "1"
            },
            body: JSON.stringify({
                session_id: SESSION_ID
            })
        });

        if (!response.ok) {
            throw new Error(`新建聊天失败: HTTP ${response.status}`);
        }

        const data = await response.json();
        await loadChatList();
        await openChat(data.chat_id);
    }

    async function sendMessage() {
        const message = messageInput.value.trim();
        if (!message) return;

        if (!currentChatId) {
            await createNewChat();
        }

        messages.push({ role: "user", text: message });
        renderMessages();

        messageInput.value = "";
        setLoading(true);

        const assistantMsgDiv = createMessageElement("assistant", "");
        chatBox.appendChild(assistantMsgDiv);
        scrollToBottom();

        try {
            const response = await fetch(`${API_BASE}/chat/stream`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "ngrok-skip-browser-warning": "1"
                },
                body: JSON.stringify({
                    message: message,
                    session_id: SESSION_ID,
                    chat_id: currentChatId,
                    image_path: uploadedImagePath
                })
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            if (!response.body) {
                throw new Error("浏览器不支持流式响应");
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");

            let fullReply = "";
            let pendingChunk = "";
            let renderScheduled = false;

            function scheduleRender() {
                if (renderScheduled) return;
                renderScheduled = true;

                requestAnimationFrame(() => {
                    if (pendingChunk) {
                        fullReply += pendingChunk;
                        pendingChunk = "";
                        assistantMsgDiv.textContent = fullReply;
                        scrollToBottom();
                    }
                    renderScheduled = false;
                });
            }

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, { stream: true });
                pendingChunk += chunk;
                scheduleRender();
            }

            if (pendingChunk) {
                fullReply += pendingChunk;
                assistantMsgDiv.textContent = fullReply;
            }

            messages.push({ role: "assistant", text: fullReply });
            scrollToBottom();

            await loadChatList();
            await openChat(currentChatId);
        } catch (error) {
            console.error("请求失败:", error);
            assistantMsgDiv.textContent = `请求失败：${error.message}`;
        } finally {
            setLoading(false);
            messageInput.focus();
            scrollToBottom();
        }
        console.log("发送时 image_path =", uploadedImagePath);
    }

    async function uploadImage(file) {
        const formData = new FormData();
        formData.append("file", file);

        const res = await fetch(`${API_BASE}/upload-image`, {
            method: "POST",
            headers: {
                "ngrok-skip-browser-warning": "1"
            },
            body: formData
        });

        if (!res.ok) {
            throw new Error(`图片上传失败: HTTP ${res.status}`);
        }

        const data = await res.json();
        uploadedImagePath = data.preview_url;

        imagePreview.style.display = "block";
        imagePreview.innerHTML = `
            <div class="preview-card">
                <img src="${data.preview_url}" alt="preview">
                <div class="preview-meta">
                    <div class="name">已上传：${file.name}</div>
                    <button type="button" id="removeImageButton">移除图片</button>
                </div>
            </div>
        `;

        document.getElementById("removeImageButton").addEventListener("click", clearImage);
    }

    sendButton.addEventListener("click", () => {
        console.log("clicked");
        sendMessage();
    });

    newChatButton.addEventListener("click", async () => {
        try {
            setLoading(true);
            await createNewChat();
            messageInput.focus();
        } catch (error) {
            console.error("新建聊天失败:", error);
            alert(`新建聊天失败：${error.message}`);
        } finally {
            setLoading(false);
        }
    });

    messageInput.addEventListener("keydown", function (event) {
        if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    });

    dropZone.addEventListener("click", () => imageInput.click());

    imageInput.addEventListener("change", async () => {
        if (imageInput.files[0]) {
            try {
                await uploadImage(imageInput.files[0]);
            } catch (error) {
                console.error(error);
                alert(error.message);
            }
        }
    });

    dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("dragover");
    });

    dropZone.addEventListener("dragleave", () => {
        dropZone.classList.remove("dragover");
    });

    dropZone.addEventListener("drop", async (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragover");

        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith("image/")) {
            try {
                await uploadImage(file);
            } catch (error) {
                console.error(error);
                alert(error.message);
            }
        }
    });

    window.addEventListener("load", async () => {
        try {
            await loadChatList();

            if (chatListData.length > 0) {
                await openChat(chatListData[0].chat_id);
            } else {
                await createNewChat();
            }
        } catch (error) {
            console.error("初始化失败:", error);
            chatTitle.textContent = "💬 Digital Companion";
            chatBox.innerHTML = "";
            chatBox.appendChild(createMessageElement("assistant", `初始化失败：${error.message}`));
        }
    });

    menuButton.addEventListener("click", () => {
        sidebar.classList.toggle("open");
    });

    document.addEventListener("click", (e) => {
        if (!sidebar.contains(e.target) && !menuButton.contains(e.target)) {
            sidebar.classList.remove("open");
        }
    });

</script>
</body>
</html>
